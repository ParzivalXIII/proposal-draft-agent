{% extends "base.html" %}

{% block content %}
<div class="mb-8 bg-white p-6 rounded-lg shadow">
    <h1 class="text-2xl font-bold text-gray-900 mb-4">Create New Proposal</h1>
    <form hx-post="/ui/proposals" hx-swap="none" class="grid grid-cols-1 gap-4 sm:grid-cols-3">
        <div>
            <label class="block text-sm font-medium text-gray-700">Client Name</label>
            <input type="text" name="client_name" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm p-2 border">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700">Problem Description</label>
            <textarea name="problem_description" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm p-2 border" rows="2"></textarea>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700">Rough Scope</label>
            <textarea name="rough_scope" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm p-2 border" rows="2"></textarea>
        </div>
        <div class="sm:col-span-3">
            <button type="submit" class="rounded-md bg-indigo-600 px-3 py-2 text-sm font-semibold text-white shadow-sm hover:bg-indigo-500">
                Generate Proposal
            </button>
        </div>
    </form>
</div>

<div>
    <h2 class="text-xl font-bold text-gray-900 mb-4">Recent Proposals</h2>
    
    <!-- NEW: HTMX polling container for the proposal list -->
    <div id="proposal-list"
         hx-get="/ui/proposals/fragment"
         hx-trigger="every 3s"
         hx-swap="outerHTML">
        {% include "fragments/proposal_list.html" %}
    </div>
</div>
{% endblock %}
