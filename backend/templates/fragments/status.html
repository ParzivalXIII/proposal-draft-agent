<!-- Notice how hx-trigger changes to 'none' when completed, stopping the poll -->
<div id="proposal-status"
     {% if proposal.status == 'completed' or proposal.status == 'failed' %}
     hx-trigger="none"
     {% else %}
     hx-trigger="every 2s"
     {% endif %}
     hx-get="/ui/proposals/{{ proposal.id }}/fragment"
     hx-swap="outerHTML">

    {% if proposal.status == 'running' or proposal.status == 'queued' %}
        <div class="flex items-center bg-blue-50 text-blue-700 px-4 py-3 rounded relative">
            <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-blue-700" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <strong class="font-bold">Generating proposal...</strong>
            <span class="block sm:inline ml-2">This takes about 60 seconds.</span>
        </div>
    {% elif proposal.status == 'failed' %}
        <div class="bg-red-50 text-red-700 px-4 py-3 rounded relative">
            <strong class="font-bold">Generation failed.</strong>
            <span class="block sm:inline ml-2">{{ proposal.error_message }}</span>
        </div>
    {% elif proposal.status == 'completed' %}
        <!-- The 'prose' class from @tailwindcss/typography makes the Markdown beautiful -->
        <div class="bg-white shadow overflow-hidden sm:rounded-lg p-6 prose prose-indigo max-w-none">
            {{ brief_card_html | safe }}
        </div>
    {% endif %}
</div>
